openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User profile
  - name: notes
    description: Smart notes
  - name: ideas
    description: Idea vault
  - name: memories
    description: Memory bank
  - name: resources
    description: Resource library
  - name: graph
    description: Knowledge graph
  - name: chats
    description: AI chat
  - name: brain
    description: Dashboard intelligence
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "400":
          description: Invalid input or email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes:
    get:
      operationId: listNotes
      tags: [notes]
      summary: List notes
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      operationId: createNote
      tags: [notes]
      summary: Create a note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /notes/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getNote
      tags: [notes]
      summary: Get a note
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateNote
      tags: [notes]
      summary: Update a note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Delete a note
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ideas:
    get:
      operationId: listIdeas
      tags: [ideas]
      summary: List ideas
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Idea"
    post:
      operationId: createIdea
      tags: [ideas]
      summary: Create an idea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdeaInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Idea"

  /ideas/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getIdea
      tags: [ideas]
      summary: Get an idea
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Idea"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateIdea
      tags: [ideas]
      summary: Update an idea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdeaUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Idea"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteIdea
      tags: [ideas]
      summary: Delete an idea
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /memories:
    get:
      operationId: listMemories
      tags: [memories]
      summary: List memories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Memory"
    post:
      operationId: createMemory
      tags: [memories]
      summary: Create a memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"

  /memories/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getMemory
      tags: [memories]
      summary: Get a memory
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMemory
      tags: [memories]
      summary: Update a memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMemory
      tags: [memories]
      summary: Delete a memory
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /resources:
    get:
      operationId: listResources
      tags: [resources]
      summary: List resources
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"
    post:
      operationId: createResource
      tags: [resources]
      summary: Create a resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"

  /resources/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getResource
      tags: [resources]
      summary: Get a resource
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateResource
      tags: [resources]
      summary: Update a resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteResource
      tags: [resources]
      summary: Delete a resource
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /graph:
    get:
      operationId: getGraph
      tags: [graph]
      summary: Get the full knowledge graph
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphResult"

  /graph/nodes:
    post:
      operationId: createGraphNode
      tags: [graph]
      summary: Create a graph node
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GraphNodeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphNode"

  /graph/edges:
    post:
      operationId: createGraphEdge
      tags: [graph]
      summary: Create a graph edge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GraphEdgeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphEdge"

  /chats:
    get:
      operationId: listChats
      tags: [chats]
      summary: List chats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chat"
    post:
      operationId: createChat
      tags: [chats]
      summary: Create a chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"

  /chats/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getChat
      tags: [chats]
      summary: Get a chat with its messages
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteChat
      tags: [chats]
      summary: Delete a chat
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /brain/decide:
    post:
      operationId: brainDecide
      tags: [brain]
      summary: Get proactive suggested actions
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrainDecisionResult"

  /brain/search:
    post:
      operationId: brainSearch
      tags: [brain]
      summary: Universal search across all modules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrainSearchResult"

  /brain/activity:
    get:
      operationId: brainActivity
      tags: [brain]
      summary: Recent AI agent actions (activity timeline)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentActivityResult"

  /brain/knowledge-stats:
    get:
      operationId: brainKnowledgeStats
      tags: [brain]
      summary: Knowledge graph statistics for the dashboard overview
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    RegisterInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 6 }

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    User:
      type: object
      required: [id, email, role, createdAt]
      properties:
        id: { type: string }
        email: { type: string }
        role: { type: string }
        createdAt: { type: string, format: date-time }

    AuthResult:
      type: object
      required: [token, user]
      properties:
        token: { type: string }
        user:
          $ref: "#/components/schemas/User"

    Note:
      type: object
      required: [id, userId, title, content, tags, isMarkdown, isPinned, createdAt, updatedAt]
      properties:
        id: { type: string }
        userId: { type: string }
        title: { type: string }
        content: { type: string }
        tags:
          type: array
          items: { type: string }
        isMarkdown: { type: boolean }
        isPinned: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    NoteInput:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1 }
        content: { type: string }
        tags:
          type: array
          items: { type: string }
        isMarkdown: { type: boolean }

    NoteUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        content: { type: string }
        tags:
          type: array
          items: { type: string }
        isMarkdown: { type: boolean }
        isPinned: { type: boolean }

    Idea:
      type: object
      required: [id, userId, title, content, tags, status, priority, createdAt, updatedAt]
      properties:
        id: { type: string }
        userId: { type: string }
        title: { type: string }
        content: { type: string }
        category: { type: ["string", "null"] }
        tags:
          type: array
          items: { type: string }
        status: { type: string }
        priority: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    IdeaInput:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1 }
        content: { type: string }
        category: { type: string }
        tags:
          type: array
          items: { type: string }
        status: { type: string }
        priority: { type: string }

    IdeaUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        content: { type: string }
        category: { type: string }
        tags:
          type: array
          items: { type: string }
        status: { type: string }
        priority: { type: string }

    Memory:
      type: object
      required: [id, userId, title, description, category, tags, importanceScore, confidenceScore, isArchived, createdAt, updatedAt]
      properties:
        id: { type: string }
        userId: { type: string }
        title: { type: string }
        description: { type: string }
        category: { type: string }
        tags:
          type: array
          items: { type: string }
        importanceScore: { type: integer }
        confidenceScore: { type: integer }
        isArchived: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    MemoryInput:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        category: { type: string }
        tags:
          type: array
          items: { type: string }
        importanceScore: { type: integer }
        confidenceScore: { type: integer }

    MemoryUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        category: { type: string }
        tags:
          type: array
          items: { type: string }
        importanceScore: { type: integer }
        confidenceScore: { type: integer }
        isArchived: { type: boolean }

    Resource:
      type: object
      required: [id, userId, title, category, isProcessed, createdAt, updatedAt]
      properties:
        id: { type: string }
        userId: { type: string }
        title: { type: string }
        category: { type: string }
        description: { type: ["string", "null"] }
        fileName: { type: ["string", "null"] }
        isProcessed: { type: boolean }
        aiSummary: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ResourceInput:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1 }
        category: { type: string }
        description: { type: string }
        fileName: { type: string }

    ResourceUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        category: { type: string }
        description: { type: string }
        isProcessed: { type: boolean }
        aiSummary: { type: string }

    GraphNode:
      type: object
      required: [id, userId, entityType, entityId, label, createdAt]
      properties:
        id: { type: string }
        userId: { type: string }
        entityType: { type: string }
        entityId: { type: string }
        label: { type: string }
        createdAt: { type: string, format: date-time }

    GraphNodeInput:
      type: object
      required: [entityType, entityId, label]
      properties:
        entityType: { type: string }
        entityId: { type: string }
        label: { type: string }

    GraphEdge:
      type: object
      required: [id, userId, sourceNodeId, targetNodeId, relationshipType, weight, createdAt]
      properties:
        id: { type: string }
        userId: { type: string }
        sourceNodeId: { type: string }
        targetNodeId: { type: string }
        relationshipType: { type: string }
        weight: { type: number }
        createdAt: { type: string, format: date-time }

    GraphEdgeInput:
      type: object
      required: [sourceNodeId, targetNodeId, relationshipType]
      properties:
        sourceNodeId: { type: string }
        targetNodeId: { type: string }
        relationshipType: { type: string }
        weight: { type: number }

    GraphResult:
      type: object
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/GraphEdge"

    Chat:
      type: object
      required: [id, userId, title, isPinned, createdAt, updatedAt]
      properties:
        id: { type: string }
        userId: { type: string }
        title: { type: string }
        isPinned: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ChatInput:
      type: object
      properties:
        title: { type: string }

    ChatMessage:
      type: object
      required: [id, chatId, role, content, createdAt]
      properties:
        id: { type: string }
        chatId: { type: string }
        role: { type: string }
        content: { type: string }
        createdAt: { type: string, format: date-time }

    ChatDetail:
      type: object
      required: [id, userId, title, isPinned, createdAt, updatedAt, messages]
      properties:
        id: { type: string }
        userId: { type: string }
        title: { type: string }
        isPinned: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"

    SearchInput:
      type: object
      required: [query]
      properties:
        query: { type: string }
        limit: { type: integer }

    DecisionAction:
      type: object
      required: [title, description, actionType]
      properties:
        title: { type: string }
        description: { type: string }
        actionType: { type: string }

    BrainDecisionResult:
      type: object
      required: [decisions]
      properties:
        decisions:
          type: array
          items:
            $ref: "#/components/schemas/DecisionAction"

    BrainSearchResultItem:
      type: object
      required: [id, title, type]
      properties:
        id: { type: string }
        title: { type: string }
        type: { type: string }
        snippet: { type: ["string", "null"] }

    BrainSearchResult:
      type: object
      required: [query, results]
      properties:
        query: { type: string }
        results:
          type: array
          items:
            $ref: "#/components/schemas/BrainSearchResultItem"

    AgentAction:
      type: object
      required: [id, userId, actionType, summary, status, createdAt]
      properties:
        id: { type: string }
        userId: { type: string }
        chatId: { type: ["string", "null"] }
        actionType: { type: string }
        entityType: { type: ["string", "null"] }
        entityId: { type: ["string", "null"] }
        summary: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }

    AgentActivityResult:
      type: object
      required: [actions]
      properties:
        actions:
          type: array
          items:
            $ref: "#/components/schemas/AgentAction"

    KnowledgeStats:
      type: object
      required: [nodeCount, edgeCount, byType]
      properties:
        nodeCount: { type: integer }
        edgeCount: { type: integer }
        byType:
          type: object
          additionalProperties:
            type: integer
