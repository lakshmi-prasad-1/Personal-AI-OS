version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: ai_brain_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aibrain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: ai_brain_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  pgdata:
