# Google App Engine configuration
runtime: python310
entrypoint: uvicorn app.main:app --host 0.0.0.0 --port $PORT

env_variables:
  PROJECT_NAME: "AI Brain OS"
  API_V1_STR: "/api/v1"

# Automatic scaling
automatic_scaling:
  min_instances: 1
  max_instances: 10
  target_cpu_utilization: 0.6
  target_throughput_utilization: 0.6

# Health check
health_check:
  check_interval_sec: 30
  timeout_sec: 10
  failure_threshold: 3
  success_threshold: 2

# Instance configuration
instance_class: F2

# Resources
resources:
  cpu: 2
  memory_gb: 4
  disk_size_gb: 10
